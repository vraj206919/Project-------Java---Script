<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Largest Number Finder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">
    <div class="card">
        <p class="heading">LARGEST NUMBER FINDER</p>

        <form id="largestForm">

            <div class="inputBox">
                <label class="labelText">Number One</label>
                <input
                    type="number"
                    id="numOne"
                    placeholder="Enter First Number"
                    class="inputField"
                    required
                >
            </div>

            <div class="inputBox">
                <label class="labelText">Number Two</label>
                <input
                    type="number"
                    id="numTwo"
                    placeholder="Enter Second Number"
                    class="inputField"
                    required
                >
            </div>

            <div class="inputBox">
                <label class="labelText">Number Three</label>
                <input
                    type="number"
                    id="numThree"
                    placeholder="Enter Third Number"
                    class="inputField"
                    required
                >
            </div>

            <button type="submit" class="checkBtn">CHECK</button>

            <div id="answer"></div>

        </form>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
